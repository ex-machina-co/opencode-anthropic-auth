name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish --access public --provenance
